events {
    worker_connections 1024;
}

http {
    # Backend upstream — uses Docker internal service name
    upstream backend {
        server backend:3000;
    }

    # ─── Phase 1: HTTP only ───────────────────────────────────────────
    # During initial setup and for Let's Encrypt certificate challenge.
    # After you have your SSL certificate, add the Phase 2 block below.
    server {
        listen 80;
        server_name YOUR_DOMAIN_HERE;   # ← Replace with your domain, e.g. api.yourdomain.com

        # Let's Encrypt ACME challenge — certbot needs this to verify domain ownership
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        # For now, proxy HTTP directly to backend (before SSL is set up)
        # Once SSL is ready, replace this with a redirect: return 301 https://$host$request_uri;
        location / {
            proxy_pass         http://backend;
            proxy_http_version 1.1;

            # WebSocket support (required for Socket.IO)
            proxy_set_header   Upgrade    $http_upgrade;
            proxy_set_header   Connection "upgrade";

            # Standard proxy headers
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_cache_bypass $http_upgrade;

            # Timeouts (important for long-lived Socket.IO connections)
            proxy_read_timeout  3600;
            proxy_send_timeout  3600;
        }
    }

    # ─── Phase 2: HTTPS (add this after running certbot) ─────────────
    # Uncomment the block below ONLY after your SSL certificate is issued.
    #
    # server {
    #     listen 443 ssl;
    #     server_name YOUR_DOMAIN_HERE;
    #
    #     ssl_certificate     /etc/letsencrypt/live/YOUR_DOMAIN_HERE/fullchain.pem;
    #     ssl_certificate_key /etc/letsencrypt/live/YOUR_DOMAIN_HERE/privkey.pem;
    #
    #     # Recommended SSL settings
    #     ssl_protocols TLSv1.2 TLSv1.3;
    #     ssl_prefer_server_ciphers on;
    #
    #     location / {
    #         proxy_pass         http://backend;
    #         proxy_http_version 1.1;
    #         proxy_set_header   Upgrade    $http_upgrade;
    #         proxy_set_header   Connection "upgrade";
    #         proxy_set_header   Host              $host;
    #         proxy_set_header   X-Real-IP         $remote_addr;
    #         proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
    #         proxy_set_header   X-Forwarded-Proto $scheme;
    #         proxy_cache_bypass $http_upgrade;
    #         proxy_read_timeout  3600;
    #         proxy_send_timeout  3600;
    #     }
    # }
    #
    # Also update the HTTP server block above to redirect instead of proxy:
    # Replace the "location /" block with:
    #     location / { return 301 https://$host$request_uri; }
}
